name: .NET CD Pipeline

on:
  workflow_dispatch:

    inputs:

      project_id:
        description: "Google Cloud Project ID"
        required: true
        type: string

      region:
        description: "Google Cloud Region"
        required: true
        default: us-central1
        type: string

      environment:
        description: "Deployment Environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - qa
          - prod

      service_name:
        description: "Cloud Run Service Name"
        required: true
        type: string

      image_name:
        description: "Docker Image Name"
        required: true
        type: string

      image_tag:
        description: "Docker Image Tag"
        required: true
        default: latest
        type: string

      health_endpoint:
        description: "Application health endpoint"
        required: false
        default: /
        type: string

permissions:
  contents: read
  id-token: write

env:
  TERRAFORM_DIR: terraform

jobs:

##############################################################################
# Deploy
##############################################################################

  deploy:

    name: Deploy to Cloud Run

    runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}

    steps:

##############################################################################
# Checkout
##############################################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

##############################################################################
# Authenticate GCP
##############################################################################

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

##############################################################################
# Setup Cloud SDK
##############################################################################

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Google Cloud
        run: |
          gcloud config set project "${{ inputs.project_id }}"
          gcloud auth list
          gcloud config list

##############################################################################
# Setup Terraform
##############################################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

##############################################################################
# Terraform Format
##############################################################################

      - name: Terraform Format Check
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform fmt -check

##############################################################################
# Terraform Init
##############################################################################

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

##############################################################################
# Terraform Validate
##############################################################################

      - name: Terraform Validate
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform validate

##############################################################################
# Terraform Plan
##############################################################################

      - name: Terraform Plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform plan \
            -out=tfplan \
            -var="project_id=${{ inputs.project_id }}" \
            -var="region=${{ inputs.region }}" \
            -var="service_name=${{ inputs.service_name }}"

##############################################################################
# Terraform Apply
##############################################################################

      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform apply \
            -auto-approve \
            tfplan

##############################################################################
# Deploy Application
##############################################################################

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ inputs.service_name }}" \
            --image docker.io/${{ secrets.REGISTRY_USERNAME }}/${{ inputs.image_name }}:${{ inputs.image_tag }} \
            --region "${{ inputs.region }}" \
            --platform managed \
            --allow-unauthenticated

##############################################################################
# Verify Deployment
##############################################################################

      - name: Verify Cloud Run Service
        run: |
          echo "========================================"
          echo "Cloud Run Service"
          echo "========================================"

          gcloud run services describe "${{ inputs.service_name }}" \
            --region="${{ inputs.region }}"

##############################################################################
# Verify Image
##############################################################################

      - name: Verify Deployed Image
        run: |
          echo "========================================"
          echo "Running Image"
          echo "========================================"

          gcloud run services describe "${{ inputs.service_name }}" \
            --region="${{ inputs.region }}" \
            --format="value(spec.template.spec.containers[0].image)"

##############################################################################
# Health Check
##############################################################################

      - name: Health Check
        run: |

          URL=$(gcloud run services describe "${{ inputs.service_name }}" \
            --region="${{ inputs.region }}" \
            --format='value(status.url)')

          HEALTH_URL="${URL}${{ inputs.health_endpoint }}"

          echo "========================================"
          echo "Application URL"
          echo "========================================"
          echo "$HEALTH_URL"

          echo ""
          echo "Running Health Check..."

          curl \
            --fail \
            --silent \
            --show-error \
            "$HEALTH_URL"

          echo ""
          echo "Health Check Passed"

##############################################################################
# Deployment Summary
##############################################################################

      - name: Deployment Summary
        run: |
          echo "========================================"
          echo ".NET CD Pipeline Summary"
          echo "========================================"
          echo "Environment : ${{ inputs.environment }}"
          echo "Project ID  : ${{ inputs.project_id }}"
          echo "Region      : ${{ inputs.region }}"
          echo "Service     : ${{ inputs.service_name }}"
          echo "Image       : docker.io/${{ secrets.REGISTRY_USERNAME }}/${{ inputs.image_name }}:${{ inputs.image_tag }}"
          echo "Terraform   : Success"
          echo "Deployment  : Success"
          echo "========================================"
