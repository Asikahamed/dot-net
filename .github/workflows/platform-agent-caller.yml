name: Platform Agent

on:
  push:
      branches:
        - main

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  platform-agent:
    uses: Asikahamed/Platform-agent-dotnet/.github/workflows/platform-agent-reusable.yml@fix/path-issues

    with:
      app_repository: ${{ github.repository }}
      app_branch: ${{ github.ref_name }}

    secrets:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}