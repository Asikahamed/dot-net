name: .NET CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**

  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  IMAGE_NAME: ${{ github.event.repository.name }}
  PROJECT_FILE: "./src/Conduit/Conduit.csproj"

jobs:

##############################################################################
# Build
##############################################################################

  build:

    name: Build

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Verify .NET SDK
        run: dotnet --info

      - name: Restore Dependencies
        run: dotnet restore "${{ env.PROJECT_FILE }}"

      - name: Build Application
        run: |
          dotnet build \
            "${{ env.PROJECT_FILE }}" \
            --configuration Release \
            --no-restore

##############################################################################
# Test
##############################################################################

  test:

    name: Test

    runs-on: ubuntu-latest

    needs: build

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Dependencies
        run: dotnet restore "${{ env.PROJECT_FILE }}"

      - name: Build Application
        run: |
          dotnet build \
            "${{ env.PROJECT_FILE }}" \
            --configuration Release \
            --no-restore

      - name: Run Unit Tests
        run: |
          dotnet test \
            "${{ env.PROJECT_FILE }}" \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage"

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            **/TestResults/**
          if-no-files-found: ignore

##############################################################################
# Package
##############################################################################

  package:

    name: Package

    runs-on: ubuntu-latest

    needs: test

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Dependencies
        run: dotnet restore "${{ env.PROJECT_FILE }}"

      - name: Build Application
        run: |
          dotnet build \
            "${{ env.PROJECT_FILE }}" \
            --configuration Release \
            --no-restore

      - name: Publish Application
        run: |
          dotnet publish \
            "${{ env.PROJECT_FILE }}" \
            --configuration Release \
            --output publish \
            --no-build

      - name: Upload Published Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-publish
          path: publish
          retention-days: 7

##############################################################################
# Docker
##############################################################################

  docker:

    name: Docker Build & Push

    runs-on: ubuntu-latest

    needs: package

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Published Artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-publish
          path: publish

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.REGISTRY_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pipeline Summary
        run: |
          echo "========================================"
          echo ".NET CI Pipeline"
          echo "========================================"
          echo ".NET SDK     : ${{ env.DOTNET_VERSION }}"
          echo "Build Tool   : dotnet CLI"
          echo "Configuration: Release"
          echo "Artifact     : dotnet-publish"
          echo "Docker Image : ${{ secrets.REGISTRY_USERNAME }}/${{ env.IMAGE_NAME }}"
          echo "========================================"