name: .NET CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**

  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  IMAGE_NAME: ${{ github.event.repository.name }}
  PROJECT_FILE: "./src/Conduit/Conduit.csproj"

jobs:

##############################################################################
# Build
##############################################################################

  build:

    name: Build

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Verify .NET SDK
        run: dotnet --info

      - name: Restore
        run: |
          dotnet restore "${{ env.PROJECT_FILE }}" \
            -p:NuGetAudit=false

      - name: Build Application
        run: |
          dotnet build \
            "${{ env.PROJECT_FILE }}" \
            --configuration Release \
            --no-restore

##############################################################################
# SonarQube Analysis
##############################################################################

  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
      ########################################################################
      # Checkout Repository
      ########################################################################
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ########################################################################
      # Java (Required by SonarScanner to run background logic)
      ########################################################################
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      ########################################################################
      # .NET Core SDK Setup
      ########################################################################
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      ########################################################################
      # Cache Sonar Packages (Speeds up subsequent pipeline runs)
      ########################################################################
      - name: Cache SonarQube Packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      ########################################################################
      # Cache Sonar Scanner Tool
      ########################################################################
      - name: Cache SonarScanner
        id: cache-sonar
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-sonarscanner
          restore-keys: |
            ${{ runner.os }}-dotnet-sonarscanner

      ########################################################################
      # Install SonarScanner Globally
      ########################################################################
      - name: Install SonarScanner
        if: steps.cache-sonar.outputs.cache-hit != 'true'
        run: |
          dotnet tool install \
            --global \
            dotnet-sonarscanner

      - name: Add .NET Tools to PATH
        run: |
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      ########################################################################
      # Begin Analysis (Connects via ngrok link and bypasses browser warning)
      ########################################################################
      - name: SonarQube Begin
        run: |
          dotnet sonarscanner begin \
            /k:".Net-mvc" \
            /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.ws.header="ngrok-skip-browser-warning:true"

      ########################################################################
      # Restore Dependencies
      ########################################################################
      - name: Restore Dependencies
        run: |
          dotnet restore \
            "${{ env.PROJECT_FILE }}" \
            -p:NuGetAudit=false

      ########################################################################
      # Build Application (Scanner intercepts compilation details here)
      ########################################################################
      - name: Build Application
        run: |
          dotnet build \
            "${{ env.PROJECT_FILE }}" \
            --configuration Release \
            --no-restore

      ########################################################################
      # End Analysis (Uploads final analysis via ngrok tunnel)
      ########################################################################
      - name: SonarQube End
        run: |
          dotnet sonarscanner end \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

            
##############################################################################
# Test
##############################################################################

  test:

    name: Test

    runs-on: ubuntu-latest

    needs: sonar

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Dependencies
        run: dotnet restore "${{ env.PROJECT_FILE }}"

      - name: Build Application
        run: |
          dotnet build \
            "${{ env.PROJECT_FILE }}" \
            --configuration Release \
            --no-restore

      - name: Run Unit Tests
        run: |
          dotnet test \
            "${{ env.PROJECT_FILE }}" \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage"

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            **/TestResults/**
          if-no-files-found: ignore

##############################################################################
# Package
##############################################################################

  package:

    name: Package

    runs-on: ubuntu-latest

    needs: test

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Dependencies
        run: dotnet restore "${{ env.PROJECT_FILE }}"

      - name: Build Application
        run: |
          dotnet build \
            "${{ env.PROJECT_FILE }}" \
            --configuration Release \
            --no-restore

      - name: Publish Application
        run: |
          dotnet publish \
            "${{ env.PROJECT_FILE }}" \
            --configuration Release \
            --output publish \
            --no-build

      - name: Upload Published Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-publish
          path: publish
          retention-days: 7

##############################################################################
# Docker
##############################################################################

  docker:

    name: Docker Build & Push

    runs-on: ubuntu-latest

    needs: package

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Published Artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-publish
          path: publish

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.REGISTRY_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pipeline Summary
        run: |
          echo "========================================"
          echo ".NET CI Pipeline"
          echo "========================================"
          echo ".NET SDK     : ${{ env.DOTNET_VERSION }}"
          echo "Build Tool   : dotnet CLI"
          echo "Configuration: Release"
          echo "Artifact     : dotnet-publish"
          echo "Docker Image : ${{ secrets.REGISTRY_USERNAME }}/${{ env.IMAGE_NAME }}"
          echo "========================================"
